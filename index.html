<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GullyBites 🍛</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fdf6ee;
      --card: #fff8f0;
      --orange: #e8622a;
      --orange-light: #f28c5e;
      --brown: #3d2b1f;
      --cream: #f5e6d3;
      --muted: #9c7b65;
      --shadow: 0 8px 32px rgba(61, 43, 31, 0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--brown);
      min-height: 100vh;
    }

    nav {
      background: var(--brown);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--orange-light);
    }

    .add-btn {
      background: var(--orange);
      color: #fff;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .add-btn:hover {
      background: var(--orange-light);
      transform: translateY(-1px);
    }

    .hero {
      text-align: center;
      padding: 4rem 1rem 2rem;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.8rem;
    }

    .hero h1 span {
      color: var(--orange);
    }

    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      width: 100%;
      max-width: 480px;
      padding: 0.85rem 1.4rem;
      border: 2px solid var(--cream);
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: #fff;
      color: var(--brown);
      outline: none;
      transition: border 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--orange);
    }

    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
      padding: 0 1rem;
    }

    .filter-btn {
      background: #fff;
      border: 2px solid var(--cream);
      color: var(--brown);
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-1px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
      border: 1.5px solid var(--cream);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--orange-light));
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(61, 43, 31, 0.15);
    }

    .card-category {
      display: inline-block;
      background: var(--cream);
      color: var(--orange);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .card .location {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .card .location::before {
      content: '📍 ';
    }

    .card .desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stars {
      color: #f5a623;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .delete-btn {
      background: none;
      border: 1.5px solid var(--cream);
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 1.1rem;
      grid-column: 1/-1;
      padding: 3rem;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(61, 43, 31, 0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: 24px;
      padding: 2rem;
      width: 90%;
      max-width: 460px;
      box-shadow: 0 24px 80px rgba(61, 43, 31, 0.2);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .modal input,
    .modal select,
    .modal textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border: 2px solid var(--cream);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      background: #fff;
      color: var(--brown);
      outline: none;
      transition: border 0.2s;
    }

    .modal input:focus,
    .modal select:focus,
    .modal textarea:focus {
      border-color: var(--orange);
    }

    .modal textarea {
      resize: none;
      height: 80px;
    }

    .modal-btns {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
    }

    .cancel-btn {
      background: var(--cream);
      border: none;
      color: var(--brown);
      padding: 0.65rem 1.3rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn {
      background: var(--orange);
      border: none;
      color: #fff;
      padding: 0.65rem 1.5rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: var(--orange-light);
    }

    /* Toast Notification */
    .toast {
      visibility: hidden;
      min-width: 250px;
      margin-left: -125px;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 16px;
      position: fixed;
      z-index: 1000;
      left: 50%;
      bottom: 30px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      box-shadow: var(--shadow);
    }

    .toast.show {
      visibility: visible;
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }

    .toast.success {
      background-color: #4CAF50;
    }

    .toast.error {
      background-color: #F44336;
    }

    @keyframes fadein {
      from {
        bottom: 0;
        opacity: 0;
      }

      to {
        bottom: 30px;
        opacity: 1;
      }
    }

    @keyframes fadeout {
      from {
        bottom: 30px;
        opacity: 1;
      }

      to {
        bottom: 0;
        opacity: 0;
      }
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #2e7d32;
      background: #e8f5e9;
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }

    .spot-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .map-link {
      display: inline-block;
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
      color: var(--orange);
      text-decoration: none;
      font-weight: 500;
    }

    .map-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Gully<span>Bites</span> 🍛</div>
    <button class="add-btn" onclick="openModal()">+ Add a Spot</button>
  </nav>

  <div class="hero">
    <h1>Find your next <span>favourite</span><br />gully ka khana 🔥</h1>
    <p>Community-rated hidden food gems near you. Real spots, real vibes.</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search spots, areas..." oninput="renderSpots()" />
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Chai', this)">☕ Chai</button>
      <button class="filter-btn" onclick="setFilter('Street Food', this)">🌮 Street Food</button>
      <button class="filter-btn" onclick="setFilter('Biryani', this)">🍚 Biryani</button>
      <button class="filter-btn" onclick="setFilter('Rolls', this)">🌯 Rolls</button>
      <button class="filter-btn" onclick="setFilter('Sweets', this)">🍬 Sweets</button>
      <button class="filter-btn" onclick="setFilter('Juice', this)">🥤 Juice</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Add a Gully Spot ✨</h2>
      <input type="text" id="f-name" placeholder="Spot name (e.g. Bhai ka Dhaba)" />
      <input type="text" id="f-location" placeholder="Location / Area" />
      <select id="f-category">
        <option value="">Select Category</option>
        <option>Chai</option>
        <option>Street Food</option>
        <option>Biryani</option>
        <option>Rolls</option>
        <option>Sweets</option>
        <option>Juice</option>
      </select>
      <select id="f-rating">
        <option value="">Rating</option>
        <option value="5">⭐⭐⭐⭐⭐ Must Visit</option>
        <option value="4">⭐⭐⭐⭐ Pretty Good</option>
        <option value="3">⭐⭐⭐ Decent</option>
        <option value="2">⭐⭐ Meh</option>
        <option value="1">⭐ Skip it</option>
      </select>
      <textarea id="f-desc" placeholder="What's special about this place? (Vibes, must-try items...)"></textarea>
      <input type="text" id="f-map" placeholder="Map Link (Optional: Adds Verified Badge)" />
      <input type="text" id="f-image" placeholder="Image URL (Optional: Adds Verified Badge)" />
      <div class="modal-btns">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="submit-btn" onclick="addSpot()">Add Spot 🚀</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API = 'http://localhost:5000/api/spots';
    let allSpots = [];
    let activeFilter = 'All';

    async function fetchSpots() {
      const res = await fetch(API);
      allSpots = await res.json();
      renderSpots();
    }

    function setFilter(cat, el) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderSpots();
    }

    function renderSpots() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let spots = allSpots;
      if (activeFilter !== 'All') spots = spots.filter(s => s.category === activeFilter);
      if (search) spots = spots.filter(s =>
        s.name.toLowerCase().includes(search) ||
        s.location.toLowerCase().includes(search)
      );
      const grid = document.getElementById('grid');
      if (spots.length === 0) {
        grid.innerHTML = '<div class="empty">No spots found. Be the first to add one! 🍜</div>';
        return;
      }
      grid.innerHTML = spots.map(s => `
      <div class="card">
        ${s.imageUrl ? `<img src="${s.imageUrl}" alt="${s.name}" class="spot-image">` : ''}
        <div>
          <span class="card-category">${s.category}</span>
          ${s.isVerified ? '<span class="verified-badge">✅ Verified</span>' : ''}
        </div>
        <h3>${s.name}</h3>
        <div class="location">${s.location}</div>
        ${s.mapLocation ? `<a href="${s.mapLocation}" target="_blank" class="map-link">📍 View on Map</a>` : ''}
        <div class="desc">${s.description}</div>
        <div class="card-footer">
          <div class="stars">${'⭐'.repeat(s.rating)}</div>
          <button class="delete-btn" onclick="deleteSpot('${s._id}')">Remove</button>
        </div>
      </div>
    `).join('');
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => { t.className = t.className.replace('show', '').trim(); }, 3000);
    }

    async function addSpot() {
      const name = document.getElementById('f-name').value.trim();
      const location = document.getElementById('f-location').value.trim();
      const category = document.getElementById('f-category').value;
      const rating = parseInt(document.getElementById('f-rating').value);
      const description = document.getElementById('f-desc').value.trim();
      const mapLocation = document.getElementById('f-map').value.trim();
      const imageUrl = document.getElementById('f-image').value.trim();

      if (!name || !location || !category || !rating || !description) {
        showToast('Bhai sab basic fields bharo! 🙏', 'error');
        return;
      }

      if ((mapLocation && !imageUrl) || (!mapLocation && imageUrl)) {
        showToast('To get Verified, BOTH Map Link and Image are required!', 'error');
        return;
      }

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, location, category, rating, description, mapLocation, imageUrl })
        });

        if (res.ok) {
          showToast('Spot added successfully!' + (mapLocation && imageUrl ? ' And verifed! ✅' : ' 🥳'), 'success');
          closeModal();
          fetchSpots();
        } else {
          showToast('Failed to add spot!', 'error');
        }
      } catch (err) {
        showToast('Error connecting to server!', 'error');
      }
    }

    async function deleteSpot(id) {
      if (!confirm('Remove this spot?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      fetchSpots();
    }

    function openModal() {
      document.getElementById('overlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('overlay').classList.remove('show');
      ['f-name', 'f-location', 'f-desc', 'f-map', 'f-image'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-category').value = '';
      document.getElementById('f-rating').value = '';
    }

    document.getElementById('overlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    fetchSpots();
  </script>
</body>

</html>
